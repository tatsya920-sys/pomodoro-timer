<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 液体背景 -->
        <svg class="liquid-background" viewBox="0 0 1920 1080" preserveAspectRatio="none">
            <defs>
                <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
                </linearGradient>
                <filter id="wave">
                    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" seed="2" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G" />
                </filter>
            </defs>
            <path class="liquid-wave" d="" fill="url(#liquidGradient)" filter="url(#wave)"></path>
        </svg>

        <!-- コンテンツ -->
        <div class="content">
            <!-- ヘッダー -->
            <div class="header">
                <h1>ポモドーロタイマー</h1>
                <div class="phase-indicator">
                    <span id="phaseText" class="phase-text">作業中</span>
                    <span id="setCounter" class="set-counter">セット 1/4</span>
                </div>
            </div>

            <!-- タイマー表示 -->
            <div class="timer-display">
                <div class="time-text">
                    <span id="minutes">25</span>:<span id="seconds">00</span>
                </div>
                <div class="progress-ring">
                    <svg width="200" height="200">
                        <circle cx="100" cy="100" r="90" class="progress-bg"></circle>
                        <circle cx="100" cy="100" r="90" class="progress-circle" id="progressCircle"></circle>
                    </svg>
                </div>
            </div>

            <!-- コントロール -->
            <div class="controls">
                <button id="startBtn" class="btn btn-primary">開始</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>一時停止</button>
                <button id="resetBtn" class="btn btn-secondary">リセット</button>
            </div>

            <!-- YouTube セクション -->
            <div class="youtube-section">
                <h2>音楽を再生</h2>
                <div class="youtube-input">
                    <input type="text" id="youtubeUrl" placeholder="YouTubeの動画URLを貼り付け (例: https://www.youtube.com/watch?v=...)" />
                    <button id="setVideoBtn" class="btn btn-small">設定</button>
                </div>
                <div id="youtubePlayer" class="youtube-player"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
